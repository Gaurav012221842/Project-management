version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: project-management-app-dev
    ports:
      - "8080:8080"
      - "5005:5005"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=project_management_dev
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
    depends_on:
      - postgres
      - redis
    networks:
      - pm-dev-network

  postgres:
    image: postgres:15-alpine
    container_name: project-management-db-dev
    environment:
      POSTGRES_DB: project_management_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - pm-dev-network

  redis:
    image: redis:7-alpine
    container_name: project-management-redis-dev
    ports:
      - "6379:6379"
    networks:
      - pm-dev-network

  mailhog:
    image: mailhog/mailhog
    container_name: project-management-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - pm-dev-network

volumes:
  postgres_dev_data:

networks:
  pm-dev-network:
    driver: bridge
