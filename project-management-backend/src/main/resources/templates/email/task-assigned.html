<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Task Assigned</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
  <div style="background: #4F46E5; padding: 24px; text-align: center;">
    <h1 style="color: white; margin: 0;">Task Assigned to You</h1>
  </div>
  <div style="padding: 24px;">
    <p>Hi <strong th:text="${assigneeName}">User</strong>,</p>
    <p>A task has been assigned to you:</p>
    <div style="background: #F3F4F6; padding: 16px; border-radius: 4px; margin: 16px 0;">
      <strong th:text="${taskTitle}">Task Title</strong>
    </div>
    <a href="#" style="background: #4F46E5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 8px;">View Task</a>
  </div>
</body>
</html>
