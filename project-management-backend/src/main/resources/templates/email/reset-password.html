<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Reset Password</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
  <div style="background: #4F46E5; padding: 24px; text-align: center;">
    <h1 style="color: white; margin: 0;">Password Reset Request</h1>
  </div>
  <div style="padding: 24px;">
    <p>We received a request to reset your password. Click the button below to create a new password:</p>
    <a th:href="${resetLink}" style="background: #4F46E5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 16px;">Reset Password</a>
    <p style="margin-top: 24px; color: #6B7280; font-size: 14px;">This link will expire in 1 hour. If you did not request a password reset, please ignore this email.</p>
  </div>
</body>
</html>
