<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Deadline Reminder</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
  <div style="background: #F59E0B; padding: 24px; text-align: center;">
    <h1 style="color: white; margin: 0;">Deadline Reminder</h1>
  </div>
  <div style="padding: 24px;">
    <p>This is a reminder that the following task is due tomorrow:</p>
    <div style="background: #FEF3C7; border-left: 4px solid #F59E0B; padding: 16px; margin: 16px 0;">
      <strong th:text="${taskTitle}">Task Title</strong>
      <p style="margin: 8px 0 0; color: #92400E;">Due: <span th:text="${dueDate}">2024-01-01</span></p>
    </div>
    <a href="#" style="background: #F59E0B; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; display: inline-block; margin-top: 8px;">View Task</a>
  </div>
</body>
</html>
